name: Deploy To Server

on:
  workflow_dispatch:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Upload project to server
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.DEPLOY_HOST }}
          username: ${{ secrets.DEPLOY_USER }}
          password: ${{ secrets.DEPLOY_PASSWORD }}
          source: "app,requirements.txt,Dockerfile,docker-compose.yml,.env.example,README.md"
          target: "/opt/week-billioner-bot"
          strip_components: 0
          overwrite: true

      - name: Build and run on server
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.DEPLOY_HOST }}
          username: ${{ secrets.DEPLOY_USER }}
          password: ${{ secrets.DEPLOY_PASSWORD }}
          script: |
            set -e
            APP_DIR=/opt/week-billioner-bot
            mkdir -p "$APP_DIR/data"
            cd "$APP_DIR"
            if [ ! -f .env ]; then
              echo "Missing $APP_DIR/.env. Create it once on server."
              exit 1
            fi
            docker compose up -d --build
