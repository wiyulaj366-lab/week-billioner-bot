name: Deploy To Server

on:
  workflow_dispatch:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: [self-hosted, Linux, X64, weekbot]
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Build and run on server
        run: |
          set -euo pipefail
          APP_DIR=/opt/week-billioner-bot
          mkdir -p "$APP_DIR/data"
          rsync -av --delete \
            --exclude '.git' \
            --exclude '.github' \
            --exclude 'data' \
            --exclude '.env' \
            ./ "$APP_DIR"/
          cd "$APP_DIR"
          if [ ! -f .env ]; then
            echo "Missing $APP_DIR/.env. Create it once on server."
            exit 1
          fi
          docker compose up -d --build
